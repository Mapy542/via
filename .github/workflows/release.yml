name: Release

on:
    push:
        tags:
            - 'v*'
    workflow_dispatch:
        inputs:
            version:
                description: 'Release version label (e.g. v0.1.0)'
                required: true
                type: string

env:
    RELEASE_VERSION: ${{ inputs.version || github.ref_name }}

permissions:
    contents: write # Required for creating releases

jobs:
    build-release:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Install system dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    build-essential \
                    cmake \
                    pkg-config \
                    libfuse3-dev \
                    libsecret-1-dev \
                    libdbus-1-dev \
                    libgl1-mesa-dev \
                    fuse3 \
                    file \
                    desktop-file-utils

            - name: Install Qt
              uses: jurplel/install-qt-action@v4
              with:
                  version: '6.7.3'
                  modules: 'qtnetworkauth'

            - name: Install linuxdeploy
              run: |
                  wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
                  wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
                  chmod +x linuxdeploy*.AppImage

            - name: Configure CMake
              run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr -DBUILD_TESTS=OFF

            - name: Build
              run: cmake --build build --parallel

            - name: Install to AppDir
              run: |
                  DESTDIR=AppDir cmake --install build
                  mkdir -p AppDir/usr/share/icons/hicolor/scalable/apps
                  cp res/icons/via.svg AppDir/usr/share/icons/hicolor/scalable/apps/via.svg
                  mkdir -p AppDir/usr/share/applications
                  cp res/via.desktop AppDir/usr/share/applications/

            - name: Remove unsupported Qt SQL drivers
              run: |
                  rm -f "$QT_ROOT_DIR/plugins/sqldrivers/libqsqlmimer.so"

            - name: Create AppImage
              run: |
                  export APPIMAGE_EXTRACT_AND_RUN=1
                  export QMAKE=$(which qmake6 2>/dev/null || which qmake)
                  export EXTRA_QT_PLUGINS="svg;"
                  ./linuxdeploy-x86_64.AppImage --appdir AppDir --plugin qt --output appimage

            - name: Rename AppImage
              run: |
                  mv Via*.AppImage Via-${{ env.RELEASE_VERSION }}-x86_64.AppImage

            - name: Create Release
              uses: softprops/action-gh-release@v1
              with:
                  tag_name: ${{ env.RELEASE_VERSION }}
                  name: Via ${{ env.RELEASE_VERSION }}
                  files: Via-*.AppImage
                  draft: false
                  prerelease: false
                  generate_release_notes: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
