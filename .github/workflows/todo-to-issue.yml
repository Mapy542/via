name: 'Run TODO to Issue'
on:
    push:
    workflow_dispatch:
        inputs:
            MANUAL_COMMIT_REF:
                description: 'SHA of the commit to scan (compares against its parent by default)'
                required: true
            MANUAL_BASE_REF:
                description: 'Optional earlier SHA to set the start of the comparison range'
                required: false

permissions:
    issues: write
    contents: read

jobs:
    todo-to-issue:
        runs-on: 'ubuntu-latest'
        steps:
            - uses: 'actions/checkout@v4'

            - name: 'TODO to Issue'
              uses: 'alstr/todo-to-issue-action@v5'
              env:
                  MANUAL_COMMIT_REF: ${{ inputs.MANUAL_COMMIT_REF }}
                  MANUAL_BASE_REF: ${{ inputs.MANUAL_BASE_REF }}
